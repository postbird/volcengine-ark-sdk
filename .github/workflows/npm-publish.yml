name: Node.js Package

on:
  release:
    types: [created]

permissions:
  id-token: write 
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' 
          registry-url: 'https://registry.npmjs.org'
      - run: npm run release
      - run: npm publish     